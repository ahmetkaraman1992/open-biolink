<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open BioLink</title>
    <meta
      name="description"
      content="Open-source self-hostable bio link page template."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <img id="avatar" class="avatar" src="/avatar.png" alt="Profile avatar" />

        <h1 id="name">Your Name</h1>
        <p id="headline">Creator, freelancer, developer, or small business owner</p>
        <p id="bio">A short bio goes here.</p>

        <div id="links" class="links"></div>

        <footer>
          <span>Powered by Open BioLink</span>
        </footer>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
